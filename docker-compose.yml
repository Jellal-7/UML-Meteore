version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: meteore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-meteore}
      MYSQL_USER: ${DB_USER:-meteore_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-meteore_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - meteore-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: meteore-backend
    restart: on-failure
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-meteore}
      DB_USER: ${DB_USER:-meteore_user}
      DB_PASSWORD: ${DB_PASSWORD:-meteore_pass}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - meteore-net

  frontend:
    build: ./frontend
    container_name: meteore-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - meteore-net

volumes:
  mysql-data:

networks:
  meteore-net:
    driver: bridge
